<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="gameboard">
        <div class="row">
            <button class="cell" data-row="0" data-column="0"></button>
            <button class="cell" data-row="0" data-column="1"></button>
            <button class="cell" data-row="0" data-column="2"></button>
        </div>
        <div class="row">
            <button class="cell" data-row="1" data-column="0"></button>
            <button class="cell" data-row="1" data-column="1"></button>
            <button class="cell" data-row="1" data-column="2"></button>
        </div>
        <div class="row">
            <button class="cell" data-row="2" data-column="0"></button>
            <button class="cell" data-row="2" data-column="1"></button>
            <button class="cell" data-row="2" data-column="2"></button>
        </div>
    </div>
    <div class="controls">
        <button id="restart-button">Restart</button>
        <button id="configure-button">Configure</button>
    </div>
    <dialog id="configure-dialog">
        <form action="" id="configure-form">
            <h2>Configuration</h2>
            <fieldset>
                <legend>Players</legend>
                <div>
                    <label for="player1-name">Player 1's name</label>
                    <input type="text" id="player1-name" value="Player 1">
                </div>
                <div>
                    <label for="player2-name">Player 2's name</label>
                    <input type="text" id="player2-name" value="Player 2">
                </div>
            </fieldset>
            <div>
                <button>Save Changes</button>
            </div>
        </form>
    </dialog>
    <script src="./script.js"></script>
</body>
</html>
